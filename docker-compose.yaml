services:

  backend:
    build:
      context: ./backend
    container_name: pgagi-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: pgagi-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped