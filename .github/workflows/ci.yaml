name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_USERNAME: monkweb009
  BACKEND_IMAGE: monkweb009/pgagi-backend
  FRONTEND_IMAGE: monkweb009/pgagi-frontend

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Trivy filesystem scan (source code)
  # ─────────────────────────────────────────
  trivy-fs-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy on source (backend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./backend
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Run Trivy on source (frontend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./frontend
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

  # ─────────────────────────────────────────
  # JOB 2: Build & scan images, push if changed
  # ─────────────────────────────────────────
  build-scan-push:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    needs: trivy-fs-scan
    outputs:
      backend_changed: ${{ steps.check_backend.outputs.changed }}
      frontend_changed: ${{ steps.check_frontend.outputs.changed }}
      image_tag: ${{ steps.set_tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag from git SHA
        id: set_tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── BACKEND ──────────────────────────
      - name: Build backend image
        run: |
          docker build \
            -t ${{ env.BACKEND_IMAGE }}:${{ steps.set_tag.outputs.tag }} \
            -t ${{ env.BACKEND_IMAGE }}:latest \
            ./backend

      - name: Trivy scan - backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ steps.set_tag.outputs.tag }}
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Check if backend changed
        id: check_backend
        run: |
          docker pull ${{ env.BACKEND_IMAGE }}:latest 2>/dev/null || true
          LOCAL=$(docker inspect --format='{{index .RepoDigests 0}}' \
            ${{ env.BACKEND_IMAGE }}:${{ steps.set_tag.outputs.tag }} 2>/dev/null || echo "new")
          REMOTE=$(docker inspect --format='{{index .RepoDigests 0}}' \
            ${{ env.BACKEND_IMAGE }}:latest 2>/dev/null || echo "none")
          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Push backend image
        if: steps.check_backend.outputs.changed == 'true'
        run: |
          docker push ${{ env.BACKEND_IMAGE }}:${{ steps.set_tag.outputs.tag }}
          docker push ${{ env.BACKEND_IMAGE }}:latest

      # ── FRONTEND ─────────────────────────
      - name: Build frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            -t ${{ env.FRONTEND_IMAGE }}:${{ steps.set_tag.outputs.tag }} \
            -t ${{ env.FRONTEND_IMAGE }}:latest \
            ./frontend

      - name: Trivy scan - frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ steps.set_tag.outputs.tag }}
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Check if frontend changed
        id: check_frontend
        run: |
          docker pull ${{ env.FRONTEND_IMAGE }}:latest 2>/dev/null || true
          LOCAL=$(docker inspect --format='{{index .RepoDigests 0}}' \
            ${{ env.FRONTEND_IMAGE }}:${{ steps.set_tag.outputs.tag }} 2>/dev/null || echo "new")
          REMOTE=$(docker inspect --format='{{index .RepoDigests 0}}' \
            ${{ env.FRONTEND_IMAGE }}:latest 2>/dev/null || echo "none")
          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Push frontend image
        if: steps.check_frontend.outputs.changed == 'true'
        run: |
          docker push ${{ env.FRONTEND_IMAGE }}:${{ steps.set_tag.outputs.tag }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest

  # ─────────────────────────────────────────
  # JOB 3: Deploy to ECS Dev
  # ─────────────────────────────────────────
  deploy-dev:
    name: Deploy to ECS Dev
    runs-on: ubuntu-latest
    needs: build-scan-push
    if: github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Deploy backend to ECS
        run: |
          aws ecs update-service \
            --cluster pgagi-dev-cluster \
            --service pgagi-dev-backend \
            --force-new-deployment \
            --region ap-south-1

      - name: Deploy frontend to ECS
        run: |
          aws ecs update-service \
            --cluster pgagi-dev-cluster \
            --service pgagi-dev-frontend \
            --force-new-deployment \
            --region ap-south-1

      - name: Wait for services to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster pgagi-dev-cluster \
            --services pgagi-dev-backend pgagi-dev-frontend \
            --region ap-south-1
